<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .nav-links {
            /* border: 1px solid; */
            list-style-type: none;
            display: flex;
            gap: 20px;

        }

        .nav-links li a {
            text-decoration: none;
            font-size: 16px;
            color: white;
            transition: color 0.3s;

        }

        .nav-links li a:hover {
            color: rgb(109, 171, 242);
        }

        .nav-bar {
            /* border: 1px solid; */
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: black;
            color: white;
            padding: 10px;
            /* position: relative; */

        }

        .logo {
            font-size: 20px;
            font-weight: 700;
        }

        .menu-bar {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* Id selector */
        #menu-icon {
            display: none;
        }

        @media(max-width: 768px) {
            .nav-links {
                display: none;
                /* transition: position 0.5s; */
            }

            .menu-bar {
                display: block;
            }

            /* #menu-icon {
                display: block;
            } */


            #menu-icon:checked~.nav-links {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                background-color: black;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <div class="logo">MySite</div>

        <input type="checkbox" id="menu-icon">
        <label for="menu-icon" class="menu-bar">&#9776;</label>

        <!-- <label for="uname">UserName</label>
        <input id="uname" type="text"> -->
        
        <ul class="nav-links">
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Contact</a></li>
        </ul>
    </nav>
</body>

</html>
